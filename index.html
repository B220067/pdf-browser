<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Content-Security-Policy, delivered via meta tag since GitHub Pages can't
      set custom HTTP response headers. Locked to same-origin for everything
      except style-src, which needs 'unsafe-inline' for React's inline
      style={{}} positioning (draggable text boxes, ink strokes, etc.).
      Note: frame-ancestors/report-uri/sandbox are ignored when CSP is
      delivered this way — the browser only honors them from a real header.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
    />
    <!--
      SVG first for browsers that support it, but PNG fallbacks matter too:
      Google's own favicon docs say SVG-only icons have "limited support" in
      Search — the crawler wants a real PNG, ideally 48px+, or it may just
      never show one next to search results.
    -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" href="/favicon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Free online PDF editor that runs 100% in your browser. Add text, draw, sign and download — your file never leaves your device."
    />
    <title>Free, browser-based PDF editor. No sign-up, 100% local.</title>
    <link rel="canonical" href="https://inkspdf.com/" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://inkspdf.com/" />
    <meta property="og:site_name" content="InksPDF" />
    <meta property="og:title" content="Free, browser-based PDF editor. No sign-up, 100% local." />
    <meta
      property="og:description"
      content="Free online PDF editor that runs 100% in your browser. Add text, draw, sign and download — your file never leaves your device."
    />
    <meta property="og:image" content="https://inkspdf.com/InksPDF.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Free, browser-based PDF editor. No sign-up, 100% local." />
    <meta
      name="twitter:description"
      content="Free online PDF editor that runs 100% in your browser. Add text, draw, sign and download — your file never leaves your device."
    />
    <meta name="twitter:image" content="https://inkspdf.com/InksPDF.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "InksPDF",
        "url": "https://inkspdf.com/",
        "description": "Free online PDF editor that runs 100% in your browser. Add text, draw, sign and download — your file never leaves your device.",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript.",
        "image": "https://inkspdf.com/InksPDF.png",
        "featureList": [
          "Add and format text on any PDF page",
          "Draw freehand or highlight with a pen tool",
          "True redaction that permanently deletes underlying text, not just a black box on top",
          "Draw or type a reusable signature and stamp it onto documents",
          "Fill in existing PDF form fields (text, checkbox, radio, dropdown)",
          "Reorder, rotate, and delete pages",
          "Merge multiple PDFs into one file",
          "Split a PDF or extract specific pages",
          "Add a text watermark and page numbers"
        ],
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
